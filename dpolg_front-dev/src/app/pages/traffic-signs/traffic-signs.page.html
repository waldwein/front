<ion-app>
	<app-header>
		<div headerLeft class="btn-container left-header-btn">
			<ion-button class="menu-trigger" size="small" fill="clear" color="dark" (click)="openMainMenu()">
				<ion-icon slot="icon-only" name="menu"></ion-icon>
			</ion-button>
		</div>
		<h5 headerCenter [innerHTML]="'traffic_signs' | translate"></h5>
		<div headerBottom class="catalog-search">
			<app-search-bar (searchChange)="onSearch($event)"></app-search-bar>
		</div>
		<ion-button
			headerRight
			class="home-trigger right-header-btn"
			size="small"
			fill="clear"
			color="dark"
			routerLink="/"
			routerDirection="root"
			[attr.aria-label]="'home_lable' | translate"
		>
			<ion-icon slot="icon-only" name="home-outline"></ion-icon>
		</ion-button>
	</app-header>

	<ion-content [fullscreen]="true">
		<ion-refresher slot="fixed" (ionRefresh)="loadSigns($event)">
			<ion-refresher-content></ion-refresher-content>
		</ion-refresher>

		<div class="state" *ngIf="isLoading">
			<ion-spinner name="crescent"></ion-spinner>
		</div>

		<ion-card class="error-card" *ngIf="loadError">
			<ion-card-header>
				<ion-card-title [innerHTML]="'error_title' | translate"></ion-card-title>
			</ion-card-header>
			<ion-card-content>{{ loadError }}</ion-card-content>
		</ion-card>

		<ion-accordion-group class="traffic-accordion" *ngIf="!isLoading && signsByCategory.length">
			<ion-accordion class="traffic-category" *ngFor="let group of signsByCategory; trackBy: trackByCategory" [value]="group.category">
				<ion-item slot="header" lines="full" class="sticky-accordion-header">
					<ion-label>
						<h2>{{ group.category }}</h2>
						<p>{{ group.items.length }} {{ 'entries' | translate }}</p>
					</ion-label>
				</ion-item>
				<div slot="content" class="category-content">
					<ion-list>
						<ion-item class="traffic-row" *ngFor="let sign of group.items; trackBy: trackBySign" lines="full" button (click)="openSignModal(sign)">
							<div class="traffic-thumb" slot="start">
								<img [src]="getListImage(sign)" [alt]="getName(sign) || ('traffic_sign' | translate)" (error)="onImageError($event)" />
							</div>
							<ion-label>
								<h3 class="traffic-title">{{ getName(sign) || ('traffic_sign' | translate) }}</h3>
								<!-- <p class="traffic-meta" *ngIf="sign.time_stamp">{{ sign.time_stamp }}</p> -->
							</ion-label>
						</ion-item>
					</ion-list>
				</div>
			</ion-accordion>
		</ion-accordion-group>

		<ion-item class="empty-state" *ngIf="!isLoading && !signsByCategory.length && !loadError">
			<ion-label [innerHTML]="'no_entries_found' | translate"></ion-label>
		</ion-item>

		<ion-modal
			class="traffic-modal"
			[isOpen]="signModalOpen"
			[enterAnimation]="modalEnterAnimation"
			[leaveAnimation]="modalLeaveAnimation"
			(didDismiss)="closeSignModal()"
		>
			<ng-template>
				<app-header class="modal-header">
					<ion-button headerLeft fill="clear" color="dark" (click)="closeSignModal()">
						<ion-icon slot="icon-only" name="arrow-back"></ion-icon>
					</ion-button>
					<h5 headerCenter class="app-calendar__title" [innerHTML]="'detail_view' | translate"></h5>
				</app-header>

				<ion-content class="traffic-detail">
					<ion-card *ngIf="selectedSign as sign" class="traffic-card">
						<ion-card-header>
							<div class="header-row">
								<div class="detail-image">
									<img [src]="getDetailImage(sign)" [alt]="getName(sign) || ('traffic_sign' | translate)" (error)="onImageError($event)" />
								</div>
								<div class="header-text">
									<ion-card-title class="traffic-text"> {{ getName(sign) || ('traffic_sign' | translate) }} </ion-card-title>
									<p class="traffic-meta" *ngIf="sign.category">{{ sign.category }}</p>
								</div>
							</div>
						</ion-card-header>

						<ion-card-content>
							<div class="section" *ngIf="getDescription(sign)">
								<div class="section-title" [innerHTML]="'description' | translate"></div>
								<div class="paragraph ion-text-wrap" [innerHTML]="formatDescription(sign.description)"></div>
							</div>
							<!-- 
							<div class="section">
								<div class="section-title" [innerHTML]="'info' | translate"></div>
								<ion-list lines="none">
									<ion-item class="kv" *ngIf="sign.category">
										<ion-label [innerHTML]="'category' | translate"></ion-label>
										<div class="props" slot="end">{{ sign.category }}</div>
									</ion-item>
									<ion-item class="kv" *ngIf="sign.time_stamp">
										<ion-label [innerHTML]="'timestamp' | translate"></ion-label>
										<div class="props" slot="end">{{ sign.time_stamp }}</div>
									</ion-item>
								</ion-list>
							</div> -->
						</ion-card-content>
					</ion-card>
				</ion-content>
			</ng-template>
		</ion-modal>
	</ion-content>
</ion-app>
