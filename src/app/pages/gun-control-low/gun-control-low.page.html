<ion-app>
	<app-header>
		<div headerLeft class="btn-container left-header-btn">
			<ion-button class="menu-trigger" size="small" fill="clear" color="dark" (click)="openMainMenu()">
				<ion-icon slot="icon-only" name="menu"></ion-icon>
			</ion-button>
		</div>
		<h5 headerCenter [innerHTML]="'gun_control_low' | translate"></h5>
		<div headerBottom class="catalog-search">
			<app-search-bar (searchChange)="onSearch($event)"></app-search-bar>
		</div>
		<ion-button
			headerRight
			class="home-trigger right-header-btn"
			size="small"
			fill="clear"
			color="dark"
			routerLink="/"
			routerDirection="root"
			[attr.aria-label]="'home_lable' | translate"
		>
			<ion-icon slot="icon-only" name="home-outline"></ion-icon>
		</ion-button>
	</app-header>

	<ion-content [fullscreen]="true">
		<ion-refresher slot="fixed" (ionRefresh)="loadItems($event)">
			<ion-refresher-content></ion-refresher-content>
		</ion-refresher>

		<div class="state" *ngIf="isLoading">
			<ion-spinner name="crescent"></ion-spinner>
		</div>

		<ion-card class="error-card" *ngIf="loadError">
			<ion-card-header>
				<ion-card-title [innerHTML]="'error_title' | translate"></ion-card-title>
			</ion-card-header>
			<ion-card-content>{{ loadError | translate }}</ion-card-content>
		</ion-card>

		<div class="gun-list" *ngIf="!isLoading && filteredItems.length">
			<ion-list>
				<ion-item class="gun-row" *ngFor="let item of filteredItems; trackBy: trackByItem" lines="full" button (click)="openItemModal(item)">
					<div class="gun-thumb" slot="start">
						<img [src]="getListImage(item)" [alt]="getItemName(item)" (error)="onImageError($event)" />
					</div>
					<ion-label>
						<h3 class="gun-title">{{ getItemName(item) || ('gun_control_low' | translate) }}</h3>
					</ion-label>
				</ion-item>
			</ion-list>
		</div>

		<ion-item class="empty-state" *ngIf="!isLoading && !filteredItems.length && !loadError">
			<ion-label [innerHTML]="'no_entries_found' | translate"></ion-label>
		</ion-item>

		<ion-modal
			class="gun-modal"
			[isOpen]="itemModalOpen"
			[enterAnimation]="modalEnterAnimation"
			[leaveAnimation]="modalLeaveAnimation"
			(didDismiss)="closeItemModal()"
		>
			<ng-template>
				<app-header class="modal-header">
					<ion-button headerLeft fill="clear" color="dark" (click)="closeItemModal()">
						<ion-icon slot="icon-only" name="arrow-back"></ion-icon>
					</ion-button>
					<h5 headerCenter class="app-calendar__title" [innerHTML]="'detail_view' | translate"></h5>
				</app-header>

				<ion-content class="gun-detail">
					<ion-card *ngIf="selectedItem as item" class="gun-card">
						<ion-card-header>
							<div class="header-row">
								<div class="detail-image">
									<img
										[src]="getDetailImage(item)"
										[alt]="getItemName(item) || ('gun_control_low' | translate)"
										(error)="onImageError($event)"
									/>
								</div>
								<div class="header-text">
									<ion-card-title class="gun-text">{{ getItemName(item) || ('gun_control_low' | translate) }}</ion-card-title>
								</div>
							</div>
						</ion-card-header>

						<ion-card-content>
							<div class="section" *ngIf="item.content">
								<div class="section-title" [innerHTML]="'description' | translate"></div>
								<div class="paragraph ion-text-wrap" [innerHTML]="formatDescription(item.content)"></div>
							</div>
						</ion-card-content>
					</ion-card>
				</ion-content>
			</ng-template>
		</ion-modal>
	</ion-content>
</ion-app>
