<ion-app>
	<app-header>
		<div headerLeft class="btn-container left-header-btn">
			<ion-button class="menu-trigger" size="small" fill="clear" color="dark" (click)="openMainMenu()">
				<ion-icon slot="icon-only" name="menu"></ion-icon>
			</ion-button>
		</div>
		<h5 headerCenter [innerHTML]="'hazardous_substances' | translate"></h5>
		<div headerBottom class="catalog-search">
			<app-search-bar (searchChange)="onSearch($event)"></app-search-bar>
		</div>
		<ion-button
			headerRight
			class="home-trigger right-header-btn"
			size="small"
			fill="clear"
			color="dark"
			routerLink="/"
			routerDirection="root"
			[attr.aria-label]="'home_lable' | translate"
		>
			<ion-icon slot="icon-only" name="home-outline"></ion-icon>
		</ion-button>
	</app-header>

	<ion-content [fullscreen]="true">
		<ion-refresher slot="fixed" (ionRefresh)="loadSubstances($event)">
			<ion-refresher-content></ion-refresher-content>
		</ion-refresher>

		<div class="state" *ngIf="isLoading">
			<ion-spinner name="crescent"></ion-spinner>
		</div>

		<ion-card class="error-card" *ngIf="loadError">
			<ion-card-header>
				<ion-card-title [innerHTML]="'error_title' | translate"></ion-card-title>
			</ion-card-header>
			<ion-card-content>{{ loadError }}</ion-card-content>
		</ion-card>

		<ion-accordion-group class="hazard-accordion" *ngIf="!isLoading && substancesByCategory.length">
			<ion-accordion class="hazard-category" *ngFor="let group of substancesByCategory; trackBy: trackByCategory" [value]="group.category">
				<ion-item slot="header" lines="full" class="sticky-accordion-header">
					<ion-label>
						<h2>{{ group.category }}</h2>
						<p>{{ group.items.length }} {{ 'entries' | translate }}</p>
					</ion-label>
				</ion-item>
				<div slot="content" class="category-content">
					<ion-list>
						<ion-item
							class="hazard-row"
							*ngFor="let substance of group.items; trackBy: trackBySubstance"
							lines="full"
							button
							(click)="openSubstanceModal(substance)"
						>
							<div class="hazard-thumb" slot="start">
								<img
									[src]="getListImage(substance)"
									[alt]="getSubstanceName(substance) || ('hazardous_substance' | translate)"
									(error)="onImageError($event)"
								/>
							</div>
							<ion-label>
								<h3 class="hazard-title">{{ getSubstanceName(substance) || ('unknown_substance' | translate) }}</h3>
								<!-- <p class="hazard-meta" *ngIf="substance.time_stamp">{{ substance.time_stamp }}</p> -->
							</ion-label>
						</ion-item>
					</ion-list>
				</div>
			</ion-accordion>
		</ion-accordion-group>

		<ion-item class="empty-state" *ngIf="!isLoading && !substancesByCategory.length && !loadError">
			<ion-label [innerHTML]="'no_entries_found' | translate"></ion-label>
		</ion-item>

		<ion-modal
			class="hazard-modal"
			[isOpen]="substanceModalOpen"
			[enterAnimation]="modalEnterAnimation"
			[leaveAnimation]="modalLeaveAnimation"
			(didDismiss)="closeSubstanceModal()"
		>
			<ng-template>
				<app-header class="modal-header">
					<ion-button headerLeft fill="clear" color="dark" (click)="closeSubstanceModal()">
						<ion-icon slot="icon-only" name="arrow-back"></ion-icon>
					</ion-button>
					<h5 headerCenter class="app-calendar__title" [innerHTML]="'detail_view' | translate"></h5>
				</app-header>

				<ion-content class="hazard-detail">
					<ion-card *ngIf="selectedSubstance as substance" class="hazard-card">
						<ion-card-header>
							<div class="header-row">
								<div class="detail-image">
									<img
										[src]="getDetailImage(substance)"
										[alt]="getSubstanceName(substance) || ('hazardous_substance' | translate)"
										(error)="onImageError($event)"
									/>
								</div>
								<div class="header-text">
									<ion-card-title class="hazard-text">
										{{ getSubstanceName(substance) || ('hazardous_substance' | translate) }}
									</ion-card-title>
									<p class="hazard-meta" *ngIf="substance.category">{{ substance.category }}</p>
								</div>
							</div>
						</ion-card-header>

						<ion-card-content>
							<div class="section" *ngIf="substance.description">
								<div class="section-title" [innerHTML]="'description' | translate"></div>
								<div class="paragraph ion-text-wrap" [innerHTML]="formatDescription(substance.description)"></div>
							</div>

							<!-- <div class="section">
									<div class="section-title" [innerHTML]="'info' | translate"></div>
									<ion-list lines="none">
										<ion-item class="kv" *ngIf="substance.category">
											<ion-label [innerHTML]="'category' | translate"></ion-label>
											<div class="props" slot="end">{{ substance.category }}</div>
										</ion-item>
										<ion-item class="kv" *ngIf="substance.time_stamp">
											<ion-label [innerHTML]="'timestamp' | translate"></ion-label>
											<div class="props" slot="end">{{ substance.time_stamp }}</div>
										</ion-item>
									</ion-list>
								</div> -->
						</ion-card-content>
					</ion-card>
				</ion-content>
			</ng-template>
		</ion-modal>
	</ion-content>
</ion-app>
